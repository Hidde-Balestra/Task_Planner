name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Set explicitly and passed to Gradle via build.gradle.kts so signing
      # doesn't depend on AGP's own default-location lookup, which appears to
      # resolve differently on GitHub-hosted runners than plain ~ expansion.
      DEBUG_KEYSTORE_PATH: /home/runner/.android/debug.keystore
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Restore debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$(dirname "$DEBUG_KEYSTORE_PATH")"
          printf '%s' "$DEBUG_KEYSTORE_BASE64" | base64 -d > "$DEBUG_KEYSTORE_PATH"

      - name: Verify keystore fingerprint
        run: keytool -list -v -keystore "$DEBUG_KEYSTORE_PATH" -storepass android -alias androiddebugkey | grep SHA256

      - name: Build release APK
        run: flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
